<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <title>Retend - A simpler way to build user interfaces</title>
    <meta
      property="og:title"
      content="Retend - A simpler way to build user interfaces"
    />
    <meta
      property="og:description"
      content="Retend is a modern, lightweight runtime to build incredibly fast, reactive web applications. Get started with the simpler UI framework."
    />
    <script>
      (function () {
        var theme = localStorage.getItem('retend-theme');
        if (
          theme === '"dark"' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/source/entry.tsx"></script>
  </body>
</html>
